<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Omegai | Professional Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed": "#ffffff",
              "on-secondary-fixed-variant": "#3a3c3c",
              "tertiary-container": "#919191",

            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface overflow-hidden h-screen flex flex-col">
<!-- TopNavBar -->
<header class="flex justify-between items-center w-full px-8 py-4 bg-[#131313] dark:bg-[#131313] z-50">
<div class="flex items-center gap-8">
<span class="text-lg font-black tracking-tighter text-white dark:text-white">Omegai</span>
<nav class="hidden md:flex items-center gap-6">
<a class="text-white font-bold border-b-2 border-white pb-1 font-['Manrope'] font-bold text-sm tracking-widest uppercase" href="#">File</a>
<a class="text-[#C6C6C6] font-medium hover:text-white transition-colors duration-300 font-['Manrope'] font-bold text-sm tracking-widest uppercase" href="#">Edit</a>
<a class="text-[#C6C6C6] font-medium hover:text-white transition-colors duration-300 font-['Manrope'] font-bold text-sm tracking-widest uppercase" href="#">View</a>
<a class="text-[#C6C6C6] font-medium hover:text-white transition-colors duration-300 font-['Manrope'] font-bold text-sm tracking-widest uppercase" href="#">Window</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#C6C6C6] hover:text-white" data-icon="history">history</button>
<button class="material-symbols-outlined text-[#C6C6C6] hover:text-white" data-icon="settings">settings</button>
<button class="bg-white text-[#1a1c1c] px-6 py-2 rounded-full font-bold text-xs tracking-widest uppercase hover:bg-primary-container transition-all">Export</button>
</div>
</header>
<div class="flex flex-1 relative overflow-hidden">
<!-- SideNavBar -->
<aside class="fixed left-0 top-0 h-full flex flex-col py-8 bg-[#1F1F1F] dark:bg-[#1F1F1F] w-20 md:w-64 z-40 mt-[68px]">
<div class="px-6 mb-8 hidden md:block">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="brush">brush</span>
</div>
<div>
<h3 class="text-white font-bold text-sm">Workspace</h3>
<p class="text-[#C6C6C6] text-[0.6875rem]">V1.0.4</p>
</div>
</div>
</div>
<nav class="flex-1 space-y-2">
<a class="bg-white text-[#1A1C1C] rounded-full mx-4 px-4 py-3 flex items-center gap-4 font-['Manrope'] text-[0.875rem] leading-relaxed" href="#">
<span class="material-symbols-outlined" data-icon="rebase_edit">rebase_edit</span>
<span class="hidden md:block">Tools</span>
</a>
<a class="text-[#C6C6C6] hover:text-white px-4 py-3 mx-4 flex items-center gap-4 hover:bg-[#2A2A2A] rounded-full transition-all font-['Manrope'] text-[0.875rem] leading-relaxed" href="#">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
<span class="hidden md:block">Layers</span>
</a>
<a class="text-[#C6C6C6] hover:text-white px-4 py-3 mx-4 flex items-center gap-4 hover:bg-[#2A2A2A] rounded-full transition-all font-['Manrope'] text-[0.875rem] leading-relaxed" href="#">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
<span class="hidden md:block">Adjust</span>
</a>
<a class="text-[#C6C6C6] hover:text-white px-4 py-3 mx-4 flex items-center gap-4 hover:bg-[#2A2A2A] rounded-full transition-all font-['Manrope'] text-[0.875rem] leading-relaxed" href="#">
<span class="material-symbols-outlined" data-icon="filter_vintage">filter_vintage</span>
<span class="hidden md:block">Filters</span>
</a>
<a class="text-[#C6C6C6] hover:text-white px-4 py-3 mx-4 flex items-center gap-4 hover:bg-[#2A2A2A] rounded-full transition-all font-['Manrope'] text-[0.875rem] leading-relaxed" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="hidden md:block">History</span>
</a>
</nav>
<div class="px-4 mt-auto">
<button class="w-full bg-surface-container-high text-white py-3 rounded-full text-sm font-bold border border-outline-variant/20 hover:bg-surface-variant transition-all">New Project</button>
<a class="mt-4 flex items-center gap-4 px-4 py-3 text-[#C6C6C6] hover:text-white" href="#">
<span class="material-symbols-outlined" data-icon="help">help</span>
<span class="hidden md:block">Help</span>
</a>
</div>
</aside>
<!-- Main Canvas Area -->
<main class="flex-1 ml-20 md:ml-64 bg-surface-container-lowest relative flex items-center justify-center p-16">
<!-- Central Image Canvas -->
<div class="relative w-full max-w-4xl aspect-[4/3] rounded-lg overflow-visible shadow-2xl group">
<img alt="Cinematic portrait of a lone explorer" class="w-full h-full object-cover rounded-lg" data-alt="Cinematic portrait of a lone explorer in a futuristic dark desert landscape, dramatic rim lighting, monochromatic black and white photography, high contrast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCofy-iVyjme9GTfBnJS9FlbCqnz3UQu_hckhCSEsWsl2rBzoPLZOBJge5lYYwlMfc74LW-01C2-o3MyUbNu8wgA1Yy9jgMUi3YFie7cij2D2CKFGh8qxgcusDTWBSBJJzypPI8IoUO-f_7i6nY1z0F0Of99UZJz60_ig7JcjctVEsj3XjV8sbaavdaJJFYJInJeR3X6lbl230iMsMU5UdWOGH2vHftAJaKMWW-eL3ZtgMH2KYx0GjOgm2-08sv-AQMHv8EV5eNmRcI"/>
<!-- Interaction Overlay: Simulated Context Menu -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50">
<div class="w-64 bg-surface-container-highest/85 backdrop-blur-xl rounded-lg p-2 shadow-[0_24px_48px_rgba(0,0,0,0.6)] border border-outline-variant/20">
<ul class="space-y-1">
<li>
<button class="w-full flex items-center gap-3 px-4 py-3 text-sm text-on-surface hover:bg-white hover:text-on-primary rounded-md transition-all">
<span class="material-symbols-outlined text-sm" data-icon="backspace">backspace</span>
                                    Supprimer l'arrière-plan
                                </button>
</li>
<li>
<button class="w-full flex items-center gap-3 px-4 py-3 text-sm text-on-surface hover:bg-white hover:text-on-primary rounded-md transition-all">
<span class="material-symbols-outlined text-sm" data-icon="expand">expand</span>
                                    Étendre l'image
                                </button>
</li>
<li>
<button class="w-full flex items-center gap-3 px-4 py-3 text-sm text-on-surface hover:bg-white hover:text-on-primary rounded-md transition-all">
<span class="material-symbols-outlined text-sm" data-icon="draw">draw</span>
                                    Dessiner
                                </button>
</li>
<li>
<button class="w-full flex items-center gap-3 px-4 py-3 text-sm text-on-surface hover:bg-white hover:text-on-primary rounded-md transition-all">
<span class="material-symbols-outlined text-sm" data-icon="animation">animation</span>
                                    Animer
                                </button>
</li>
</ul>
</div>
</div>
<!-- Recessed Image Info Labels -->
<div class="absolute -bottom-10 left-0 flex gap-4 text-[0.6875rem] uppercase tracking-widest text-outline">
<span>4000 x 3000 PX</span>
<span>•</span>
<span>16-BIT GRAYSCALE</span>
<span>•</span>
<span>LAYER 01</span>
</div>
</div>
</main>
</div>
<!-- Bottom Bar (The Console) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex flex-col md:flex-row justify-between items-center px-8 pb-8 pt-4 bg-[#1F1F1F]/80 backdrop-blur-xl rounded-t-xl shadow-[0_-24px_48px_rgba(0,0,0,0.4)]">
<div class="w-full md:w-1/3 flex items-center gap-6 mb-4 md:mb-0">
<div class="flex-1">
<div class="flex justify-between mb-2">
<span class="text-[0.6875rem] uppercase tracking-[0.1em] text-on-surface-variant font-bold">Intensity</span>
<span class="text-[0.6875rem] uppercase tracking-[0.1em] text-white font-bold">85%</span>
</div>
<div class="h-2 w-full bg-surface-variant rounded-full relative">
<div class="absolute left-0 top-0 h-full w-[85%] bg-white rounded-full"></div>
<div class="absolute left-[85%] top-1/2 -translate-y-1/2 w-6 h-6 bg-white rounded-full shadow-lg cursor-pointer -translate-x-1/2"></div>
</div>
</div>
</div>
<div class="w-full md:w-2/5 relative">
<input class="w-full bg-surface-container-high border-none rounded-full py-4 pl-6 pr-14 text-white placeholder-outline focus:ring-1 focus:ring-white transition-all font-body text-sm" placeholder="Décrivez ce que vous souhaitez modifier dans l'image" type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 bg-white text-on-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="magic_button">magic_button</span>
</button>
</div>
<div class="hidden lg:flex items-center gap-8 w-1/4 justify-end">
<button class="flex flex-col items-center justify-center text-[#C6C6C6] p-4 hover:text-white transition-all uppercase tracking-[0.1em] text-[0.6875rem]">
<span class="material-symbols-outlined mb-1" data-icon="crop_free">crop_free</span>
                Canvas
            </button>
<button class="flex flex-col items-center justify-center text-[#C6C6C6] p-4 hover:text-white transition-all uppercase tracking-[0.1em] text-[0.6875rem]">
<span class="material-symbols-outlined mb-1" data-icon="auto_awesome_motion">auto_awesome_motion</span>
                History
            </button>
<button class="flex flex-col items-center justify-center bg-white text-[#1A1C1C] rounded-full p-4 w-12 h-12 shadow-xl scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="ios_share">ios_share</span>
</button>
</div>
</footer>
</body></html>
